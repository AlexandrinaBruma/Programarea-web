<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popUpStyle.css">
    <script src="script.js"></script>
    <title>Edit Interface</title>
</head>
<body>

    <section class="popup-section">

        <div class="popup">
            <h1 class="h1-popup">Edit</h1>

            <div class="card">
                <img src="Imagini/product image 1.png" alt="produsul">
                <div class="product-info">
                    <div class="text">
                        <h3 class="product-h3">Beats Solo</h3>
                        <p class="product-p">$255.00</p>
                    </div>
                    <div class="colors">
                        <div class="circle1"></div>
                        <div class="circle2"></div>
                        <div class="circle3"></div>
                        <div class="circle4"></div>
                    </div>
                    <input type="text" placeholder="Comments..." class="input">
                </div>
            </div>

            <div class="buttons">
                <button class="edit-button">Edit</button>
                <button class="archive-button">Archive</button>
                <button class="delete-button">Delete</button>
            </div>
        </div>

        <img src="Imagini/close-icon.svg" alt="Close Icon" class="close-button"  onclick="closePage()">
    </section>
    
</body>
</html>
