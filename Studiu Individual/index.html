<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playwrite+AT:ital,wght@0,100..400;1,100..400&family=Quattrocento:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>AudioShop</title>
</head>
<body>
    <header class="menu">
        <div class="menu-links">
            <a href="" class="menu-link">Home</a>
            <a href="" class="menu-link">New Products</a>
            <a href="" class="menu-link">Gallery</a>
        </div>
        <button class="admin-button" onclick="goToLogin()">Admin</button>
    </header>
    <section class="hero-section">
        <img src="Imagini/background.png" alt="Imagine hero" width="100%" class="hero-image">
        <h1 class="h1-hero">PUT THE WORLD ON MUTE</h1>
    </section>

    <section class="new-products">
        <h2 id="products-h2">New Products</h2>

        <div class="all-cards"> 

            <div class="card">
                <img src="Imagini/product image 1.png" alt="produsul 1">
                <div class="product-info">
                    <div class="text">
                        <h3 id="product-h3">Beats Solo</h3>
                        <p id="product-p">$255.00</p>
                    </div>
                    <div id="colors">
                        <div id="circle1"></div>
                        <div id="circle2"></div>
                        <div id="circle3"></div>
                        <div id="circle4"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="Imagini/product image 2.png" alt="produsul 1">
                <div class="product-info">
                    <div class="text">
                        <h3 id="product-h3">Beats Solo</h3>
                        <p id="product-p">$255.00</p>
                    </div>
                    <div id="colors">
                        <div id="circle1"></div>
                        <div id="circle2"></div>
                        <div id="circle3"></div>
                        <div id="circle4"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <img src="Imagini/product image 3.png" alt="produsul 1">
                <div class="product-info">
                    <div class="text">
                        <h3 id="product-h3">Beats Solo</h3>
                        <p id="product-p">$255.00</p>
                    </div>
                    <div id="colors">
                        <div id="circle1"></div>
                        <div id="circle2"></div>
                        <div id="circle3"></div>
                        <div id="circle4"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="gallery">
        <h2 id="gallery-h2">Gallery</h2>

        <div class="sliderImages">

            <!-- centru -->
            <div id="sliderCenter">
                <img src="Imagini/Slide Item — 1.png" alt="Imagine din galerie">
            </div>

            <!-- partea dreapta -->
            <div id="sliderRight">
                <img src="Imagini/Slide Item — 2.png" alt="Imagine din galerie">
            </div>
            <div id="sliderBottomRight">
                <img src="Imagini/Slide Item — 3.png" alt="Imagine din galerie">
            </div>

            <!-- partea stanga -->
            <div id="sliderLeft">
                <img src="Imagini/Slide Item — 4.png" alt="Imagine din galerie">
            </div>
            <div id="sliderBottomLeft">
                <img src="Imagini/Slide Item — 5.png" alt="Imagine din galerie">
            </div>
        </div>

        <div class="bulletPoints">
            <div class="left-arrow">
                <img src="Imagini/left area.svg" alt="Left arrow">
            </div>

            <div class="bullets">
                <div class="bullet-big"></div>
                <div class="bullet"></div>
                <div class="bullet"></div>
                <div class="bullet"></div>
                <div class="bullet"></div>
            </div>

            <div class="right-arrow">
                <img src="Imagini/right arrow.svg" alt="Right arrow">
            </div>
        </div>

    </section>
    
</body>
</html>
