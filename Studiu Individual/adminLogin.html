<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="loginStyle.css">
    <script src="script.js"></script>
</head>
<body>
    <section class="login-section">

        <div class="login">
            <h1 class="h1-login">Welcome!</h1>

            <form action="" class="login-form">
                <div class="input-element">
                    <label for="email" class="label">Introduce email: </label>
                    <input type="text" placeholder="example@gmail.com" id="email" class="input">
                </div>

                <div class="input-element">
                    <label for="password" class="label">Introduce password: </label>
                    <input type="password" placeholder="password" id="password" class="input">
                </div>
            </form>

            <button class="login-button" onclick="goToAdmin()">Login</button>
        </div>

    </section>
    
</body>
</html>
